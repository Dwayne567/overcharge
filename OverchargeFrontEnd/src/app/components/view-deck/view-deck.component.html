<div class="view-deck-container">
  <h3>View Deck</h3>
  <p class="deck-title">Deck Title: {{ deck.title }}</p>
  <div class="flashcard-container">
    <div id="flashcard" class="flashcard" *ngFor="let card of deck.cards" [class.flipped]="card.flipped" (click)="flipCard(card)">
      <div class="front">{{ card.question }}</div>
      <div class="back">{{ card.answer }}</div>
    </div>
  </div>
</div>
